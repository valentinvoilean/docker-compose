services:
  homeassistant:
    container_name: homeassistant
    image: "ghcr.io/home-assistant/home-assistant:2026.2.2"
    volumes:
      - /share/Container/HASS/config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped
    privileged: true
    ports:
      - "8123:8123"
    networks:
      - mqtt-net
      - proxy-net

networks:
  mqtt-net:
    external: true
  proxy-net:
    external: true