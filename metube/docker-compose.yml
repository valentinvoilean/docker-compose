services:
  metube:
    image: ghcr.io/alexta69/metube:latest
    container_name: metube
    restart: unless-stopped
    ports:
      - "${METUBE_PORT:-8081}:8081"
    environment:
      - TZ=${TZ:-UTC}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-100}
      - UMASK=${UMASK:-022}
      # Queue/DB on a Docker volume — QNAP shares often block writes under .metube on the share.
      - STATE_DIR=/metube/state
      # QNAP: set false if the entrypoint cannot chown the share (see README).
      - CHOWN_DIRS=${CHOWN_DIRS:-true}
      # Optional: cap parallel jobs on a small NAS (default in image is 3)
      # - MAX_CONCURRENT_DOWNLOADS=2
    volumes:
      - ${METUBE_DOWNLOADS_HOST_PATH:-/share/Container/metube/downloads}:/downloads
      - ${METUBE_DOWNLOADS_HOST_PATH_2:-/share/Downloads}:/downloads2
      - metube_state:/metube/state

volumes:
  metube_state:
