# Optional in stack env: EVCC_VERSION (default: latest)
services:
  evcc:
    container_name: evcc
    image: evcc/evcc:${EVCC_VERSION:-latest}
    restart: always
    volumes:
      - /share/Container/evcc/evcc.yaml:/etc/evcc.yaml
      - /share/Container/evcc/data:/root/.evcc
    ports:
      - 7070:7070
      - 8887:8887
    network_mode: "host"