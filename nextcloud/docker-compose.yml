services:
  db:
    image: mariadb:10.11
    container_name: nextcloud-db
    restart: always
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    volumes:
      - /share/Container/nextcloud/db:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-nextcloud}
      - MYSQL_USER=${MYSQL_USER:-nextcloud}
    networks:
      - nextcloud-internal

  redis:
    image: redis:alpine
    container_name: nextcloud-redis
    restart: always
    networks:
      - nextcloud-internal

  app:
    image: nextcloud:33.0.0
    container_name: nextcloud-app
    restart: always
    ports:
      - 8083:80
    depends_on:
      - db
      - redis
    volumes:
      - /share/Container/nextcloud/data:/var/www/html
    environment:
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-nextcloud}
      - MYSQL_USER=${MYSQL_USER:-nextcloud}
      - MYSQL_HOST=db
      - REDIS_HOST=redis
    networks:
      - nextcloud-internal
      - proxy-net  # This is the "bridge" to your Cloudflare Tunnel
  cron:
    image: nextcloud:33.0.0
    container_name: nextcloud-cron
    restart: always
    volumes:
      - /share/Container/nextcloud/data:/var/www/html
    entrypoint: /cron.sh
    depends_on:
      - db
      - redis
    networks:
      - nextcloud-internal

networks:
  nextcloud-internal:
    driver: bridge
  proxy-net:
    external: true