# Optional in stack env: RING_MQTT_VERSION (default: latest)
services:
  ring-mqtt:
    container_name: ring-mqtt
    image: tsightler/ring-mqtt:${RING_MQTT_VERSION:-latest}
    restart: unless-stopped
    volumes:
      - /share/Container/ring-mqtt:/data
    environment:
      - MqttHost=localhsost
      - MqttPort=1883
    network_mode: host