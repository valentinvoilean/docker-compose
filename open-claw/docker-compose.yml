services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw-gateway
    restart: unless-stopped

    # ── Host port mapping (LAN access) ────────────────────────
    # Default OPENCLAW_BIND_ADDR=0.0.0.0 → reachable from any
    # NAS interface (typical for LAN access on a home NAS).
    # Lock it down by setting OPENCLAW_BIND_ADDR=127.0.0.1 in
    # .env, in which case only the Cloudflare tunnel will work.
    ports:
      - "${OPENCLAW_BIND_ADDR:-0.0.0.0}:${OPENCLAW_PORT:-18789}:18789"

    # ── Networks ──────────────────────────────────────────────
    # proxy-net : shared with cloudflare-tunnel (public access)
    # default   : implicit bridge for outbound internet
    networks:
      - proxy-net
      - default

    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace

    environment:
      # Bind to all interfaces inside the container so both the
      # host port mapping AND cloudflared can reach it.
      - OPENCLAW_GATEWAY_BIND=lan
      - OPENCLAW_DISABLE_BONJOUR=1
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - NODE_ENV=production

      # Public URL — used by the Control UI for OAuth redirects
      # and CORS origin allow-listing.
      - OPENCLAW_PUBLIC_URL=${OPENCLAW_PUBLIC_URL}

      # AI provider keys (optional — add only the ones you use)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}

      # Local Ollama running on the QNAP host
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}

    extra_hosts:
      # Maps "host.docker.internal" → QNAP host gateway IP so the
      # container can reach Ollama running on the NAS itself.
      - "host.docker.internal:host-gateway"

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    # ── Hardening ─────────────────────────────────────────────
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 512
    mem_limit: 2g
    memswap_limit: 2g
    cpus: "2.0"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    container_name: openclaw-cli
    # Shares the gateway's network namespace — reaches it on
    # 127.0.0.1 inside the namespace, no external port needed.
    network_mode: "service:openclaw-gateway"
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
    entrypoint: ["node", "dist/index.js"]
    profiles:
      - cli            # only starts when explicitly invoked
    depends_on:
      - openclaw-gateway
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  # External network created by the cloudflare-tunnel stack.
  # We attach to it; we don't create it.
  proxy-net:
    external: true
    name: proxy-net
  # Implicit bridge for outbound traffic (provider APIs, etc.)
  default:
    driver: bridge